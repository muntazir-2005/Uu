name: CI - Advanced Theos Build Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build_tweak:
    name: Build Tweak Package
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Environment
      run: |
        echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
        echo "SDKS=$GITHUB_WORKSPACE/theos/sdks" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/theos/bin:/usr/local/opt/make/libexec/gnubin:$PATH" >> $GITHUB_ENV

    - name: Install GNU Make
      run: |
        brew install make parallel
        echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

    - name: Cache Theos
      id: cache-theos
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: ${{ runner.os }}-theos-cache-v2

    - name: Install Theos
      if: steps.cache-theos.outputs.cache-hit != 'true'
      run: |
        rm -rf "$THEOS"
        git clone --recursive https://github.com/theos/theos.git "$THEOS"

    - name: Create SDKs Directory
      run: |
        mkdir -p "$SDKS"
        rm -rf "$SDKS"/*

    - name: Download iPhoneOS SDK
      run: |
        cd "$SDKS"
        
        # الطريقة الأولى
        if ! curl -L -o iPhoneOS.sdk.tar.xz "https://github.com/theos/sdks/releases/download/latest/iPhoneOS.sdk.tar.xz" 2>/dev/null; then
          # الطريقة الثانية
          if ! curl -L -o iPhoneOS.sdk.tar.xz "https://github.com/xybp888/iOS-SDKs/releases/download/14.0/iPhoneOS14.0.sdk.tar.xz" 2>/dev/null; then
            # الطريقة الثالثة
            curl -L -o iPhoneOS.sdk.tar.xz "https://files.fm/u/vyq5n7tgm8" 2>/dev/null || true
          fi
        fi
        
        if [ -f "iPhoneOS.sdk.tar.xz" ]; then
          tar -xf iPhoneOS.sdk.tar.xz
          rm iPhoneOS.sdk.tar.xz
          ls -la
        fi

    - name: Create Dummy SDK if Missing
      run: |
        if [ ! -d "$SDKS/iPhoneOS14.0.sdk" ] && [ ! -d "$SDKS/iPhoneOS.sdk" ]; then
          echo "Creating dummy SDK structure..."
          mkdir -p "$SDKS/iPhoneOS14.0.sdk/usr/include"
          mkdir -p "$SDKS/iPhoneOS14.0.sdk/usr/lib"
          touch "$SDKS/iPhoneOS14.0.sdk/SDKSettings.json"
        fi

    - name: Install Additional Dependencies
      run: |
        brew install dpkg fakeroot ldid llvm 2>/dev/null || true

    - name: Fix Makefile SDK Path
      run: |
        if [ -f "Makefile" ]; then
          sed -i '' 's/SDKVERSION.*/SDKVERSION = 14.0/g' Makefile || true
          sed -i '' 's/^[[:space:]]*THEOS.*/THEOS ?= $(GITHUB_WORKSPACE)\/theos/g' Makefile || true
        fi

    - name: Clean Build
      run: |
        make clean THEOS="$THEOS" SDKS="$SDKS" 2>/dev/null || true
        rm -rf packages/ build/ .theos/

    - name: Compile Package
      run: |
        make package FINALPACKAGE=1 \
          THEOS="$THEOS" \
          SDKS="$SDKS" \
          THEOS_DEVICE_IP=0.0.0.0 \
          -j$(sysctl -n hw.ncpu) || make package FINALPACKAGE=1 THEOS="$THEOS" SDKS="$SDKS"

    - name: Find DEB Files
      run: |
        find . -name "*.deb" -type f -exec ls -lh {} \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Package
        path: |
          packages/*.deb
          *.deb
        retention-days: 30
        if-no-files-found: warn

    - name: Create Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: packages/*.deb
        tag_name: v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
