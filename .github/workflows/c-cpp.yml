name: CI - Ultimate Jailed Pipeline (Auto-Fix & Fishhook)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_jailed_dylib:
    name: Build Jailed Dylib
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Base Environment
      run: |
        echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
        echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

    - name: 🛠️ Auto-Fix Repository & Code (Force Fix)
      run: |
        echo "=== 1. Securing Fishhook Library ==="
        curl -sO https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c
        curl -sO https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h
        
        if [ -f "Teak.xm" ]; then
          mv -v Teak.xm Tweak.xm
        fi

        echo "=== 2. Fixing Tweak.xm Compilation Errors ==="
        if [ -f "Tweak.xm" ]; then
          # 1. إضافة مكتبة UIKit
          if ! grep -q "<UIKit/UIKit.h>" Tweak.xm; then
            sed -i '' '1i\
            #import <UIKit/UIKit.h>
            ' Tweak.xm
          fi
          
          # 2. تصحيح مسار استدعاء fishhook
          sed -i '' 's|"fishhook/fishhook.h"|"fishhook.h"|g' Tweak.xm
          sed -i '' 's|<fishhook/fishhook.h>|"fishhook.h"|g' Tweak.xm

          # 3. إصلاح مشكلة C++ strict casting
          sed -i '' 's/, hooked_/, (void *)hooked_/g' Tweak.xm
          sed -i '' 's/, (void \*)&orig_/, (void **)\&orig_/g' Tweak.xm
          sed -i '' 's/, &orig_/, (void **)\&orig_/g' Tweak.xm

          # 4. إصلاح السطر المقطوع
          sed -i '' 's/{"RSA_private_decrypt", (void \*)hooked_RSA_private$/{"RSA_private_decrypt", (void *)hooked_RSA_private_decrypt, (void **)\&orig_RSA_private_decrypt},/g' Tweak.xm
          sed -i '' 's/{"RSA_private_decrypt", (void \*)hooked_RSA_private\s/{"RSA_private_decrypt", (void *)hooked_RSA_private_decrypt, (void **)\&orig_RSA_private_decrypt},/g' Tweak.xm
          
          # 5. إزالة المتغير غير المستخدم (libSystem) لتجنب خطأ -Werror
          sed -i '' 's/void \*libSystem = dlopen/dlopen/g' Tweak.xm
          
          # 6. إكمال الملف المقطوع وإغلاق الأقواس
          if ! grep -q "rebind_symbols(bindings" Tweak.xm; then
            cat << 'EOF' >> Tweak.xm
            // إكمال بقية المصفوفة
            {"RSA_public_encrypt", (void *)hooked_RSA_public_encrypt, (void **)&orig_RSA_public_encrypt},
            {"RSA_public_decrypt", (void *)hooked_RSA_public_decrypt, (void **)&orig_RSA_public_decrypt},
            {"RSA_sign", (void *)hooked_RSA_sign, (void **)&orig_RSA_sign},
            {"RSA_verify", (void *)hooked_RSA_verify, (void **)&orig_RSA_verify}
        };
        
        // تفعيل دوال Fishhook
        rebind_symbols(bindings, sizeof(bindings)/sizeof(struct rebinding));
        NSLog(@"[ShadowTrackerBypass] Fishhook bindings applied successfully!");
        
        } // End of @autoreleasepool
        } // End of constructor
        EOF
          fi
        fi

        echo "=== 3. Converting to Jailed Setup & Bypassing Strict Warnings ==="
        if [ -f "Makefile" ]; then
          sed -i '' 's|fishhook/fishhook.c|fishhook.c|g' Makefile
          sed -i '' '/THEOS_PACKAGE_SCHEME/d' Makefile
          sed -i '' 's/-lsubstrate//g' Makefile
          sed -i '' 's/TWEAK_NAME/LIBRARY_NAME/g' Makefile
          sed -i '' 's/tweak.mk/library.mk/g' Makefile
          sed -i '' 's/iphone:14.0:latest/iphone:clang:latest:14.0/g' Makefile
          sed -i '' '/after-install::/,$d' Makefile
          # إضافة علم لتخطي أخطاء التحذيرات (Bulletproof)
          echo "export CFLAGS += -Wno-error=unused-variable -Wno-error" >> Makefile
        fi

    - name: 📦 Install System Dependencies
      run: |
        brew install make llvm ldid xz wget
        mkdir -p $HOME/.local/bin
        ln -s $(which gmake) $HOME/.local/bin/make
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: ⚙️ Install Theos
      run: |
        git clone --depth=1 --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos

    - name: 📥 Download iOS SDK (Bulletproof System)
      run: |
        mkdir -p ${{ github.workspace }}/theos/sdks
        cd ${{ github.workspace }}/theos/sdks
        
        echo "=== Downloading iOS SDK ==="
        
        URLS=(
          "https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz"
          "https://github.com/theos/sdks/releases/latest/download/iPhoneOS15.0.sdk.tar.xz"
          "https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.4.sdk.tar.xz"
          "https://github.com/xybp888/iOS-SDKs/releases/download/iOS-SDKs/iPhoneOS14.5.sdk.tar.xz"
        )
        
        SUCCESS=false
        
        for url in "${URLS[@]}"; do
          echo "Trying to download from: $url"
          if wget -q -O SDK.tar.xz "$url"; then
            if file SDK.tar.xz | grep -q "XZ"; then
              echo "✓ SUCCESS! Valid SDK archive downloaded."
              xz -d SDK.tar.xz
              tar -xf SDK.tar
              rm -f SDK.tar
              SUCCESS=true
              break
            else
              echo "✗ File is not a valid XZ archive. Trying next..."
            fi
          else
            echo "✗ Download failed completely. Trying next..."
          fi
          rm -f SDK.tar.xz SDK.tar
        done
        
        if [ "$SUCCESS" = false ]; then
          echo "❌ Fatal Error: All SDK download mirrors failed!"
          exit 1
        fi

    - name: 🔨 Compile Jailed Dylib (Production)
      run: |
        make clean
        make FINALPACKAGE=1

    - name: 📁 Collect Output
      run: |
        mkdir -p Final_Dylib
        find .theos/obj -type f -name "*.dylib" -exec cp -v {} Final_Dylib/ \;
        echo "=== Output Content ==="
        ls -la Final_Dylib/

    - name: ☁️ Upload Ready Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ShadowTrackerBypass-Jailed-${{ github.run_number }}
        path: Final_Dylib/
        retention-days: 14
        if-no-files-found: error
