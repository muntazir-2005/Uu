name: CI - Advanced Jailed Build (Auto-Fix)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_jailed_dylib:
    name: Build Jailed Dylib
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Auto-Fix Repository Issues
      run: |
        echo "=== 1. Fixing Typos and Paths ==="
        # تصحيح الخطأ الإملائي في اسم ملف Teak.xm إن وجد
        if [ -f "Teak.xm" ]; then
          mv -v Teak.xm Tweak.xm
          echo "✓ Renamed Teak.xm to Tweak.xm"
        fi

        # تصحيح مسار fishhook في Makefile ليتطابق مع الصورة
        sed -i '' 's|fishhook/fishhook.c|fishhook.c|g' Makefile
        echo "✓ Fixed fishhook path"

        echo "=== 2. Converting Makefile for Non-Jailbreak (Jailed) ==="
        # إزالة إعدادات الجيلبريك (Rootless)
        sed -i '' '/THEOS_PACKAGE_SCHEME/d' Makefile
        
        # إزالة مكتبة Substrate الخاصة بالجيلبريك
        sed -i '' 's/-lsubstrate//g' Makefile

        # تحويل البناء من أداة جيلبريك (Tweak) إلى مكتبة نقية (Library)
        sed -i '' 's/TWEAK_NAME/LIBRARY_NAME/g' Makefile
        sed -i '' 's/tweak.mk/library.mk/g' Makefile
        
        # تصحيح صيغة التارجت لتكون متوافقة مع Theos الحديث
        sed -i '' 's/iphone:14.0:latest/iphone:clang:14.5:14.0/g' Makefile

        echo "=== Modified Makefile ==="
        cat Makefile

    - name: Install System Dependencies
      run: |
        brew install make llvm ldid xz
        mkdir -p $HOME/.local/bin
        ln -s $(which gmake) $HOME/.local/bin/make
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Setup Theos
      run: |
        git clone --depth=1 --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
        echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

    - name: Setup iOS 14.5 SDK
      run: |
        mkdir -p ${{ github.workspace }}/theos/sdks
        cd ${{ github.workspace }}/theos/sdks
        curl -L -k -s -o SDK.tar.xz "https://github.com/xybp888/iOS-SDKs/releases/download/14.5/iPhoneOS14.5.sdk.tar.xz"
        xz -d SDK.tar.xz
        tar -xf SDK.tar
        rm -f SDK.tar

    - name: Compile Jailed Dylib
      run: |
        make clean
        make

    - name: Collect Artifacts
      run: |
        mkdir -p output
        # البحث عن ملف الـ dylib النهائي ونقله
        find .theos/obj -type f -name "*.dylib" -exec cp -v {} output/ \;

    - name: Upload Dylib to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: ShadowTrackerBypass-Jailed-Dylib-${{ github.run_number }}
        path: output/
        retention-days: 14
