name: CI - Ultimate Jailed Pipeline (Smart Dynamic Parser)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_jailed_dylib:
    name: Build Jailed Dylib (Strict Native Build)
    runs-on: macos-14
    timeout-minutes: 40

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Base Environment
      run: |
        echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
        echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

    - name: 🎨 Auto-Generate BlackUI.swift
      run: |
        cat << 'EOF' > BlackUI.swift
        import SwiftUI
        import UIKit

        @objc(BlackUIBridge)
        public class BlackUIBridge: NSObject {
            @objc public static func showProtectionUI() {
                DispatchQueue.main.async {
                    if #available(iOS 15.0, *) {
                        guard let window = UIApplication.shared.windows.first(where: { $0.isKeyWindow }),
                              let rootVC = window.rootViewController else { return }
                        var topController = rootVC
                        while let presented = topController.presentedViewController {
                            topController = presented
                        }
                        let hostingController = UIHostingController(rootView: MainContainerView())
                        hostingController.modalPresentationStyle = .overFullScreen
                        hostingController.view.backgroundColor = .clear
                        topController.present(hostingController, animated: true) {
                            NotificationCenter.default.post(name: NSNotification.Name("BlackProtectionActivated"), object: nil)
                        }
                    }
                }
            }
        }

        @available(iOS 15.0, *)
        struct MainContainerView: View {
            @State private var showProtectionToast = false
            @State private var isVisible = true
            var body: some View {
                if isVisible {
                    ZStack(alignment: .top) {
                        HomeView(isVisible: $isVisible)
                        if showProtectionToast {
                            ProtectionToastView().transition(.move(edge: .top).combined(with: .opacity)).zIndex(1)
                        }
                    }
                    .onReceive(NotificationCenter.default.publisher(for: NSNotification.Name("BlackProtectionActivated"))) { _ in
                        withAnimation(.spring(response: 0.5, dampingFraction: 0.6, blendDuration: 0)) {
                            showProtectionToast = true
                        }
                        DispatchQueue.main.asyncAfter(deadline: .now() + 4) {
                            withAnimation(.easeInOut) { showProtectionToast = false }
                        }
                    }
                }
            }
        }

        @available(iOS 15.0, *)
        struct ProtectionToastView: View {
            var body: some View {
                HStack(spacing: 15) {
                    Image(systemName: "shield.checkerboard").font(.system(size: 24, weight: .bold)).foregroundColor(.green)
                    VStack(alignment: .leading, spacing: 2) {
                        Text("تم تشغيل الحماية").font(.headline).fontWeight(.bold).foregroundColor(.white)
                        Text("BLACK.").font(.caption).foregroundColor(.gray)
                    }
                    Spacer()
                }
                .padding().background(.ultraThinMaterial).clipShape(RoundedRectangle(cornerRadius: 20, style: .continuous))
                .overlay(RoundedRectangle(cornerRadius: 20, style: .continuous).stroke(LinearGradient(colors: [.green.opacity(0.6), .clear], startPoint: .topLeading, endPoint: .bottomTrailing), lineWidth: 1))
                .shadow(color: .green.opacity(0.2), radius: 15, x: 0, y: 10).padding(.horizontal, 20).padding(.top, 40)
            }
        }

        @available(iOS 15.0, *)
        struct HomeView: View {
            @State private var isAnimating = false
            @Binding var isVisible: Bool
            var body: some View {
                ZStack {
                    Color.black.opacity(0.95).ignoresSafeArea()
                    Circle().fill(Color.blue.opacity(0.15)).frame(width: 300, height: 300).blur(radius: 60).offset(x: -100, y: -200)
                    Circle().fill(Color.purple.opacity(0.15)).frame(width: 300, height: 300).blur(radius: 60).offset(x: 100, y: 200)
                    VStack(spacing: 40) {
                        Spacer()
                        Text("BLACK")
                            .font(.system(size: 70, weight: .black, design: .rounded))
                            .foregroundStyle(LinearGradient(colors: [Color.white, Color.gray.opacity(0.6)], startPoint: .top, endPoint: .bottom))
                            .shadow(color: .white.opacity(isAnimating ? 0.4 : 0.1), radius: isAnimating ? 20 : 5, x: 0, y: 0)
                            .scaleEffect(isAnimating ? 1.02 : 1.0)
                            .animation(.easeInOut(duration: 2).repeatForever(autoreverses: true), value: isAnimating)
                            .onAppear { isAnimating = true }
                        
                        VStack(spacing: 15) {
                            GlassCardView(icon: "checkmark.shield.fill", title: "حالة النظام", value: "تم التشغيل", color: .green)
                        }
                        .padding(.horizontal, 24)
                        
                        Spacer()
                        FloatingTabBar(isVisible: $isVisible)
                    }
                }
            }
        }

        @available(iOS 15.0, *)
        struct GlassCardView: View {
            var icon: String; var title: String; var value: String; var color: Color
            var body: some View {
                HStack {
                    Image(systemName: icon).font(.system(size: 24, weight: .medium)).foregroundColor(color).frame(width: 40)
                    Text(title).font(.system(size: 18, weight: .semibold)).foregroundColor(.white)
                    Spacer()
                    Text(value).font(.system(size: 16, weight: .bold)).foregroundColor(.white)
                        .padding(.horizontal, 16).padding(.vertical, 8).background(color.opacity(0.8)).clipShape(Capsule())
                }
                .padding().background(.ultraThinMaterial).clipShape(RoundedRectangle(cornerRadius: 20, style: .continuous))
                .overlay(RoundedRectangle(cornerRadius: 20, style: .continuous).stroke(Color.white.opacity(0.1), lineWidth: 1))
            }
        }

        @available(iOS 15.0, *)
        struct FloatingTabBar: View {
            @Binding var isVisible: Bool
            var body: some View {
                HStack(spacing: 0) {
                    TabBarIcon(icon: "xmark.circle.fill", isSelected: false) {
                        withAnimation {
                            isVisible = false
                            guard let window = UIApplication.shared.windows.first(where: { $0.isKeyWindow }),
                                  let rootVC = window.rootViewController else { return }
                            rootVC.dismiss(animated: true)
                        }
                    }
                }
                .padding(.vertical, 15).padding(.horizontal, 40).background(.ultraThinMaterial).clipShape(Capsule())
                .overlay(Capsule().stroke(Color.white.opacity(0.1), lineWidth: 1)).shadow(color: .black.opacity(0.5), radius: 20, x: 0, y: 10).padding(.bottom, 20)
            }
        }

        @available(iOS 15.0, *)
        struct TabBarIcon: View {
            var icon: String; var isSelected: Bool; var action: (() -> Void)?
            var body: some View {
                Button(action: { action?() }) {
                    Image(systemName: icon).font(.system(size: 28)).foregroundColor(isSelected ? .white : .red.opacity(0.8)).scaleEffect(isSelected ? 1.1 : 1.0).animation(.spring(), value: isSelected)
                }
            }
        }
        EOF

    - name: 🛠️ Smart Dynamic Parsing Engine
      run: |
        echo "=== 1. Preparing Fishhook ==="
        curl -sO https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c
        curl -sO https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h
        
        if [ -f "Teak.xm" ]; then mv -v Teak.xm Tweak.xm; fi
        
        echo "=== 2. Creating Python Parser ==="
        cat << 'PY_EOF' > fix_tweak.py
        import re

        try:
            with open("Tweak.xm", "r", encoding="utf-8") as f:
                content = f.read()
        except UnicodeDecodeError:
            with open("Tweak.xm", "r", encoding="latin-1") as f:
                content = f.read()

        # استيراد المكتبات الأساسية لضمان عمل الواجهة والـ Swizzling
        if "<UIKit/UIKit.h>" not in content:
            content = "#import <UIKit/UIKit.h>\n" + content
        if "<objc/runtime.h>" not in content:
            content = "#import <objc/runtime.h>\n#import <objc/message.h>\n" + content
            
        content = content.replace('"fishhook/fishhook.h"', '"fishhook.h"')
        content = content.replace('<fishhook/fishhook.h>', '"fishhook.h"')

        # قطع الأجزاء القديمة المعطوبة لمنع الأخطاء النحوية وتداخل الدوال
        # تمت إضافة %ctor لضمان عدم القص داخل دالة التشغيل الخاصة بـ Theos
        cut_idx = len(content)
        for marker in ["%ctor", "struct rebinding bindings", "__attribute__((constructor))", "static __attribute__((constructor))"]:
            idx = content.find(marker)
            if idx != -1 and idx < cut_idx:
                cut_idx = idx

        clean_content = content[:cut_idx]

        # إغلاق أي دالة مفتوحة بشكل سليم قبل إضافة المحرك الجديد في النطاق العام (Global Scope)
        last_brace = clean_content.rfind("}")
        if last_brace != -1:
            clean_content = clean_content[:last_brace+1]

        # === قلب المحرك: استخراج الدوال الموجودة في ملفك فقط ===
        hooks = list(set(re.findall(r'hooked_([a-zA-Z0-9_]+)', clean_content)))

        c_hooks = []
        objc_hooks = []

        # تصنيف الدوال ذكياً
        for hook in hooks:
            if f"orig_{hook}" in clean_content:
                # إذا كانت الدالة تحتوي على id self, SEL _cmd فهي Objective-C
                if re.search(fr'hooked_{hook}\s*\(\s*(__strong\s*)?id\s+self\s*,\s*SEL', clean_content):
                    objc_hooks.append(hook)
                else:
                    c_hooks.append(hook)

        # بناء محرك الربط بناءً على ملفك حصرياً (بدون تكرار أو إعادة تعريف أو تداخل)
        engine = "\n\n// --- ULTIMATE DYNAMIC ENGINE ---\n"
        engine += """
        static void swizzleSelectorEverywhere(NSString *selName, void *newImpl, void *origImplPrefix) {
            SEL selector = NSSelectorFromString(selName);
            int numClasses = objc_getClassList(NULL, 0);
            if (numClasses > 0) {
                Class *classes = (Class *)malloc(sizeof(Class) * numClasses);
                numClasses = objc_getClassList(classes, numClasses);
                for (int i = 0; i < numClasses; i++) {
                    Class cls = classes[i];
                    Method m = class_getInstanceMethod(cls, selector);
                    if (m) {
                        IMP orig = method_getImplementation(m);
                        if (orig != (IMP)newImpl) {
                            if (origImplPrefix) { *(IMP *)origImplPrefix = orig; }
                            method_setImplementation(m, (IMP)newImpl);
                        }
                    }
                    Method mClass = class_getClassMethod(cls, selector);
                    if (mClass) {
                        IMP orig = method_getImplementation(mClass);
                        if (orig != (IMP)newImpl) {
                            if (origImplPrefix) { *(IMP *)origImplPrefix = orig; }
                            method_setImplementation(mClass, (IMP)newImpl);
                        }
                    }
                }
                free(classes);
            }
        }
        """

        engine += "__attribute__((constructor)) static void init_ultimate_bypass_engine() {\n"
        engine += "    @autoreleasepool {\n"
        engine += '        NSLog(@"[ShadowTrackerBypass] Engine Starting...");\n'

        if objc_hooks:
            for hook in objc_hooks:
                engine += f'        swizzleSelectorEverywhere(@"{hook}", (void *)hooked_{hook}, (void **)&orig_{hook});\n'

        if c_hooks:
            engine += "        struct rebinding bindings[] = {\n"
            for hook in c_hooks:
                engine += f'            {{"{hook}", (void *)hooked_{hook}, (void **)&orig_{hook}}},\n'
            engine += "        };\n"
            engine += f"        rebind_symbols(bindings, {len(c_hooks)});\n"

        engine += """
            dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(2.0 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                Class uiClass = NSClassFromString(@"BlackUIBridge");
                if (uiClass) {
                    [uiClass performSelector:@selector(showProtectionUI)];
                }
            });
        }
        }
        """

        with open("Tweak.xm", "w", encoding="utf-8") as f:
            f.write(clean_content + engine)
            
        print(f"SUCCESS! Hooks routed: {len(c_hooks)} C functions -> Fishhook | {len(objc_hooks)} Obj-C functions -> Runtime Swizzling.")
        PY_EOF

        echo "=== 3. Executing Smart Parser ==="
        python3 fix_tweak.py

    - name: 🛠️ Rewrite Clean Makefile
      run: |
        echo "=== Creating Flawless Makefile ==="
        cat << 'EOF' > Makefile
        SWIFT_VERSION = 5.0
        ARCHS = arm64 arm64e
        TARGET := iphone:clang:latest:14.0
        
        include $(THEOS)/makefiles/common.mk
        
        LIBRARY_NAME = ShadowTrackerBypass
        ShadowTrackerBypass_FILES = Tweak.xm BlackUI.swift fishhook.c
        ShadowTrackerBypass_FRAMEWORKS = Foundation UIKit SwiftUI Security AdSupport AppTrackingTransparency
        ShadowTrackerBypass_CFLAGS = -fobjc-arc -Wno-unused-variable -Wno-unused-function -Wno-error -Wno-incompatible-pointer-types -Wno-mismatched-parameter-types
        ShadowTrackerBypass_LDFLAGS = -Wl,-no_warn_inits
        
        include $(THEOS_MAKE_PATH)/library.mk
        EOF

    - name: 📦 Install System Dependencies
      run: |
        brew install make llvm ldid xz wget coreutils
        mkdir -p $HOME/.local/bin
        ln -s $(which gmake) $HOME/.local/bin/make
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: ⚙️ Install Theos
      run: |
        git clone --depth=1 --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos

    - name: 🔐 Compile Official OpenSSL from Source
      run: |
        echo "=== Downloading Official OpenSSL 3.1.5 ==="
        OPENSSL_VER="3.1.5"
        
        curl -sL -o openssl.tar.gz "https://www.openssl.org/source/openssl-${OPENSSL_VER}.tar.gz"
        if ! file openssl.tar.gz | grep -q "gzip compressed data"; then
          curl -sL -o openssl.tar.gz "https://www.openssl.org/source/old/3.1/openssl-${OPENSSL_VER}.tar.gz"
        fi
        
        tar -xf openssl.tar.gz
        cd openssl-${OPENSSL_VER}
        
        IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        
        make clean || true
        CC="clang" ./Configure ios64-cross no-shared no-async -isysroot $IOS_SDK -miphoneos-version-min=14.0
        make -j$(sysctl -n hw.ncpu)
        cp libssl.a libssl_arm64.a
        cp libcrypto.a libcrypto_arm64.a
        
        make clean || true
        sed -i '' 's/-arch arm64/-arch arm64e/g' Configurations/15-ios.conf
        CC="clang" ./Configure ios64-cross no-shared no-async -isysroot $IOS_SDK -miphoneos-version-min=14.0
        make -j$(sysctl -n hw.ncpu)
        cp libssl.a libssl_arm64e.a
        cp libcrypto.a libcrypto_arm64e.a
        
        lipo -create libssl_arm64.a libssl_arm64e.a -output libssl.a
        lipo -create libcrypto_arm64.a libcrypto_arm64e.a -output libcrypto.a
        
        mkdir -p ${{ github.workspace }}/theos/lib
        mkdir -p ${{ github.workspace }}/theos/include
        cp -v libssl.a libcrypto.a ${{ github.workspace }}/theos/lib/
        cp -rv include/openssl ${{ github.workspace }}/theos/include/

    - name: 📥 Download iOS SDK
      run: |
        mkdir -p ${{ github.workspace }}/theos/sdks
        cd ${{ github.workspace }}/theos/sdks
        
        URLS=(
          "https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz"
          "https://github.com/theos/sdks/releases/latest/download/iPhoneOS15.0.sdk.tar.xz"
          "https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.4.sdk.tar.xz"
        )
        for url in "${URLS[@]}"; do
          if wget -q -O SDK.tar.xz "$url"; then
            if file SDK.tar.xz | grep -q "XZ"; then
              xz -d SDK.tar.xz
              tar -xf SDK.tar
              rm -f SDK.tar
              break
            fi
          fi
        done

    - name: 🔨 Compile Jailed Dylib (Pure Native Build)
      run: |
        make clean
        make FINALPACKAGE=1

    - name: 📁 Collect Output
      run: |
        mkdir -p Final_Dylib
        find .theos/obj -type f -name "*.dylib" -exec cp -v {} Final_Dylib/ \;

    - name: ☁️ Upload Ready Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ShadowTrackerBypass-Jailed-${{ github.run_number }}
        path: Final_Dylib/
        retention-days: 14
        if-no-files-found: error
