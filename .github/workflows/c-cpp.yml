name: CI - Advanced Theos Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_tweak:
    name: Build Tweak Package
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment
      run: |
        echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

    - name: Cache Theos
      id: cache-theos
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: ${{ runner.os }}-theos-v4

    - name: Install Theos & SDKs
      if: steps.cache-theos.outputs.cache-hit != 'true'
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS
        git clone --depth=1 https://github.com/theos/sdks.git $THEOS/sdks

    - name: Verify SDK
      run: |
        ls -la $THEOS/sdks/

    - name: Compile and Package
      run: |
        make package FINALPACKAGE=1 THEOS=$THEOS

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ShadowTrackerBypass-Package
        path: packages/*.deb
        if-no-files-found: error
