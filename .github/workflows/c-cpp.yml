name: CI - Jailed Dylib Build (Fishhook)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos
  SDKS: ${{ github.workspace }}/theos/sdks

jobs:
  build_dylib:
    name: Build Jailed Dylib
    runs-on: macos-14
    timeout-minutes: 60

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
        echo "SDKS=${{ github.workspace }}/theos/sdks" >> $GITHUB_ENV
        echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        brew install make xz llvm
        mkdir -p $HOME/.local/bin
        ln -s $(which gmake) $HOME/.local/bin/make
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Theos & SDK (iOS 14.5)
      run: |
        git clone --depth=1 --recursive https://github.com/theos/theos.git "$THEOS"
        mkdir -p "$SDKS"
        cd "$SDKS"
        curl -L -k -s -o SDK.tar.xz "https://github.com/xybp888/iOS-SDKs/releases/download/14.5/iPhoneOS14.5.sdk.tar.xz"
        xz -d SDK.tar.xz
        tar -xf SDK.tar
        rm -f SDK.tar

    - name: Download Fishhook
      run: |
        echo "=== Downloading Fishhook ==="
        curl -sO https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c
        curl -sO https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h

    - name: Generate Source Files
      run: |
        echo "=== Creating Main.m (Fishhook Example) ==="
        cat > Main.m << 'MAINEOF'
#import <Foundation/Foundation.h>
#import <dlfcn.h>
#import "fishhook.h"

// 1. تعريف مؤشر للدالة الأصلية
static int (*orig_sysctlbyname)(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen);

// 2. كتابة الدالة المعدلة الخاصة بنا
int my_sysctlbyname(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
    if (strcmp(name, "hw.machine") == 0) {
        // يمكنك تعديل الاستجابة هنا (مثلاً تخطي فحص الأجهزة)
        NSLog(@"[ShadowTracker] Intercepted sysctlbyname for: %s", name);
    }
    return orig_sysctlbyname(name, oldp, oldlenp, newp, newlen);
}

// 3. دالة البناء (تعمل تلقائياً عند حقن المكتبة في التطبيق)
__attribute__((constructor)) static void init_bypass() {
    NSLog(@"[ShadowTracker] Dylib Loaded successfully!");
    
    // ربط الدالة الأصلية بالدالة المعدلة باستخدام Fishhook
    struct rebinding rebindings[] = {
        {"sysctlbyname", my_sysctlbyname, (void *)&orig_sysctlbyname}
    };
    
    rebind_symbols(rebindings, 1);
}
MAINEOF

        echo "=== Creating Makefile for Dylib ==="
        cat > Makefile << 'MAKEEOF'
ARCHS = arm64
TARGET = iphone:clang:14.5:14.0

include $(THEOS)/makefiles/common.mk

# استخدمنا LIBRARY بدلاً من TWEAK لمنع ارتباط المكتبة بـ Substrate
LIBRARY_NAME = ShadowTracker
ShadowTracker_FILES = Main.m fishhook.c
ShadowTracker_CFLAGS = -fobjc-arc -Wno-everything
ShadowTracker_FRAMEWORKS = Foundation

include $(THEOS_MAKE_PATH)/library.mk
MAKEEOF

    - name: Compile Dylib
      run: |
        make clean
        make

    - name: Collect Dylib Artifact
      run: |
        mkdir -p output_dylib
        # البحث عن ملف الـ dylib ونقله لمجلد المخرجات
        find .theos/obj -type f -name "*.dylib" -exec cp -v {} output_dylib/ \;
        
        echo "=== Output Content ==="
        ls -la output_dylib/

    - name: Upload Dylib to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: ShadowTracker-Jailed-Dylib-${{ github.run_number }}
        path: output_dylib/
        retention-days: 14
