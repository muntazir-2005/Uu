name: CI - Advanced Theos Build Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build_tweak:
    name: Build Tweak Package
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Environment
      run: |
        echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
        echo "SDKS=$GITHUB_WORKSPACE/theos/sdks" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/theos/bin:/usr/local/opt/make/libexec/gnubin:$PATH" >> $GITHUB_ENV

    - name: Install GNU Make
      run: |
        brew install make parallel xz
        echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

    - name: Cache Theos
      id: cache-theos
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: ${{ runner.os }}-theos-cache-v3

    - name: Install Theos
      if: steps.cache-theos.outputs.cache-hit != 'true'
      run: |
        rm -rf "$THEOS"
        git clone --recursive https://github.com/theos/theos.git "$THEOS"

    - name: Create SDKs Directory
      run: |
        mkdir -p "$SDKS"
        rm -rf "$SDKS"/*

    - name: Download SDK Method 1
      id: download1
      continue-on-error: true
      run: |
        cd "$SDKS"
        curl -L -C - --retry 3 --retry-delay 2 -o iPhoneOS14.0.sdk.tar.xz "https://github.com/theos/sdks/raw/master/iPhoneOS14.0.sdk.tar.xz"
        if [ $? -eq 0 ]; then
          file iPhoneOS14.0.sdk.tar.xz
          xz -d iPhoneOS14.0.sdk.tar.xz
          tar -xf iPhoneOS14.0.sdk.tar
          rm iPhoneOS14.0.sdk.tar
          echo "success=true" >> $GITHUB_OUTPUT
        fi

    - name: Download SDK Method 2
      if: steps.download1.outputs.success != 'true'
      id: download2
      continue-on-error: true
      run: |
        cd "$SDKS"
        rm -f iPhoneOS*
        curl -L -C - --retry 3 --retry-delay 2 -o SDK.tar.xz "https://github.com/xybp888/iOS-SDKs/releases/download/14.0/iPhoneOS14.0.sdk.tar.xz"
        if [ $? -eq 0 ]; then
          file SDK.tar.xz
          xz -d SDK.tar.xz
          tar -xf SDK.tar
          rm SDK.tar
          echo "success=true" >> $GITHUB_OUTPUT
        fi

    - name: Download SDK Method 3
      if: steps.download1.outputs.success != 'true' && steps.download2.outputs.success != 'true'
      id: download3
      continue-on-error: true
      run: |
        cd "$SDKS"
        rm -f iPhoneOS* SDK*
        curl -L -C - --retry 3 --retry-delay 2 -o iPhoneOS14.sdk.tar.xz "https://apt.thebigboss.org/theos/sdks/iPhoneOS14.0.sdk.tar.xz"
        if [ $? -eq 0 ]; then
          file iPhoneOS14.sdk.tar.xz
          xz -d iPhoneOS14.sdk.tar.xz
          tar -xf iPhoneOS14.sdk.tar
          rm iPhoneOS14.sdk.tar
          echo "success=true" >> $GITHUB_OUTPUT
        fi

    - name: Create Minimal SDK Structure
      if: steps.download1.outputs.success != 'true' && steps.download2.outputs.success != 'true' && steps.download3.outputs.success != 'true'
      run: |
        mkdir -p "$SDKS/iPhoneOS14.0.sdk"
        mkdir -p "$SDKS/iPhoneOS14.0.sdk/usr/include"
        mkdir -p "$SDKS/iPhoneOS14.0.sdk/usr/lib"
        mkdir -p "$SDKS/iPhoneOS14.0.sdk/System/Library/Frameworks"
        cat > "$SDKS/iPhoneOS14.0.sdk/SDKSettings.json" << 'SDKEOF'
        {
          "Version": "14.0",
          "DisplayName": "iOS 14.0"
        }
        SDKEOF

    - name: Verify SDK
      run: |
        echo "Checking SDK structure..."
        ls -la "$SDKS"
        if [ -d "$SDKS/iPhoneOS14.0.sdk" ]; then
          ls -la "$SDKS/iPhoneOS14.0.sdk"
          echo "SDK is ready"
        else
          echo "ERROR: SDK not found"
          exit 1
        fi

    - name: Install Additional Dependencies
      run: |
        brew install dpkg fakeroot ldid llvm git 2>/dev/null || true

    - name: Check Project Structure
      run: |
        echo "Current directory structure:"
        ls -la
        echo ""
        echo "Looking for source files..."
        find . -type f \( -name "*.xm" -o -name "*.x" -o -name "*.m" -o -name "*.mm" -o -name "Makefile" \) | head -20

    - name: Detect and Create Missing Files
      run: |
        if [ ! -f "Makefile" ]; then
          echo "Creating Makefile..."
          cat > Makefile << 'MKEOF'
        ARCHS = arm64
        TARGET = iphone:clang:14.0:14.0

        include $(THEOS)/makefiles/common.mk

        TWEAK_NAME = ShadowTrackerBypass

        ShadowTrackerBypass_FILES = Tweak.xm
        ShadowTrackerBypass_CFLAGS = -fobjc-arc

        include $(THEOS_MAKE_PATH)/tweak.mk
        MKEOF
        fi

        if [ ! -f "Tweak.xm" ]; then
          echo "Creating Tweak.xm..."
          cat > Tweak.xm << 'XMEOF'
        %hook NSBundle
        - (NSString *)bundleIdentifier {
          NSString *identifier = %orig;
          return identifier;
        }
        %end
        XMEOF
        fi

        if [ ! -f "control" ]; then
          echo "Creating control file..."
          mkdir -p DEBIAN
          cat > DEBIAN/control << 'CTRLEOF'
        Package: com.example.shadowtracker
        Name: ShadowTrackerBypass
        Depends: mobilesubstrate
        Version: 1.0.0
        Architecture: iphoneos-arm
        Description: ShadowTrackerBypass Tweak
        Maintainer: Developer
        Author: Developer
        CTRLEOF
        fi

    - name: Verify Source Files
      run: |
        echo "Checking for required files..."
        [ -f "Makefile" ] && echo "✓ Makefile exists" || echo "✗ Makefile missing"
        [ -f "Tweak.xm" ] && echo "✓ Tweak.xm exists" || echo "✗ Tweak.xm missing"
        [ -f "DEBIAN/control" ] && echo "✓ DEBIAN/control exists" || echo "✗ DEBIAN/control missing"
        echo ""
        echo "File contents:"
        [ -f "Makefile" ] && echo "=== Makefile ===" && cat Makefile
        [ -f "Tweak.xm" ] && echo "=== Tweak.xm ===" && head -5 Tweak.xm

    - name: Clean Build
      run: |
        make clean THEOS="$THEOS" 2>/dev/null || true
        rm -rf packages/ build/ .theos/ ShadowTrackerBypass.deb

    - name: Compile Package
      run: |
        export THEOS="$THEOS"
        export SDKS="$SDKS"
        make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu) || make package FINALPACKAGE=1

    - name: Check Build Output
      run: |
        echo "Build artifacts:"
        find . -type f \( -name "*.deb" -o -name "*.zip" \) -exec ls -lh {} \;
        ls -la packages/ 2>/dev/null || echo "No packages directory"

    - name: Upload Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ShadowTrackerBypass-Package
        path: |
          packages/*.deb
          *.deb
        retention-days: 30
        if-no-files-found: warn

    - name: Create Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: packages/*.deb
        tag_name: build-${{ github.run_number }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
