name: CI - Advanced Theos Build Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build_tweak:
    name: Build Tweak Package
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Environment
      run: |
        echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
        echo "SDKS=$GITHUB_WORKSPACE/theos/sdks" >> $GITHUB_ENV
        echo "PATH=/opt/homebrew/opt/make/libexec/gnubin:$GITHUB_WORKSPACE/theos/bin:$PATH" >> $GITHUB_ENV

    - name: Install GNU Make
      run: |
        brew install make parallel xz
        echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

    - name: Cache Theos
      id: cache-theos
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: ${{ runner.os }}-theos-complete-v4

    - name: Install Theos
      if: steps.cache-theos.outputs.cache-hit != 'true'
      run: |
        rm -rf "$THEOS"
        git clone --recursive https://github.com/theos/theos.git "$THEOS"

    - name: Create SDKs Directory
      run: |
        mkdir -p "$SDKS"
        rm -rf "$SDKS"/*

    - name: Download SDK from Releases
      id: download-sdk
      continue-on-error: true
      run: |
        cd "$SDKS"
        echo "Attempting to download SDK..."
        
        curl -L -k --insecure --retry 5 --retry-delay 3 --connect-timeout 30 -o iOS14.sdk.tar "https://github.com/theos/sdks/releases/download/latest/iPhoneOS14.0.sdk.tar" 2>&1 | tail -20
        
        if [ -f "iOS14.sdk.tar" ] && [ $(stat -f%z "iOS14.sdk.tar") -gt 1000000 ]; then
          echo "SDK downloaded successfully"
          tar -xf iOS14.sdk.tar
          rm iOS14.sdk.tar
          echo "success=true" >> $GITHUB_OUTPUT
          ls -la
        else
          echo "Download failed or file too small"
          rm -f iOS14.sdk.tar
          exit 1
        fi

    - name: Create Minimal SDK
      if: steps.download-sdk.outputs.success != 'true'
      run: |
        echo "Creating minimal SDK structure..."
        mkdir -p "$SDKS/iPhoneOS14.0.sdk/usr/include"
        mkdir -p "$SDKS/iPhoneOS14.0.sdk/usr/lib"
        mkdir -p "$SDKS/iPhoneOS14.0.sdk/System/Library/Frameworks"
        
        cat > "$SDKS/iPhoneOS14.0.sdk/SDKSettings.json" << 'EOF'
{
  "Version": "14.0",
  "DisplayName": "iOS 14.0",
  "MinimumDeploymentTarget": "14.0"
}
EOF
        
        ls -la "$SDKS/iPhoneOS14.0.sdk/"

    - name: Install Dependencies
      run: |
        brew install dpkg fakeroot ldid llvm git

    - name: Detect Project Structure
      run: |
        echo "=== Repository Structure ==="
        find . -maxdepth 3 -type f \( -name "*.xm" -o -name "*.x" -o -name "*.m" -o -name "Makefile" -o -name "*.plist" \) 2>/dev/null | head -30
        echo ""
        echo "=== Directory Listing ==="
        ls -la

    - name: Clean and Prepare
      run: |
        make clean THEOS="$THEOS" 2>/dev/null || true
        rm -rf packages/ build/ .theos/

    - name: Build Project
      continue-on-error: true
      run: |
        export THEOS="$THEOS"
        export SDKS="$SDKS"
        export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
        
        if [ -f "Makefile" ]; then
          echo "Building with existing Makefile..."
          make package FINALPACKAGE=1 || true
        else
          echo "No Makefile found, attempting generic build..."
          exit 1
        fi

    - name: Check for Build Output
      run: |
        echo "Searching for build artifacts..."
        find . -type f -name "*.deb" -exec ls -lh {} \;
        ls -la packages/ 2>/dev/null || echo "packages/ not found"
        ls -la .theos/obj/debug/ 2>/dev/null || echo "debug output not found"

    - name: Alternative Build Method
      if: failure()
      run: |
        export THEOS="$THEOS"
        export SDKS="$SDKS"
        
        echo "Attempting alternative build..."
        
        if [ -f "Makefile" ]; then
          cat Makefile
          echo ""
          echo "Running make with verbose output..."
          make -B package FINALPACKAGE=1 THEOS="$THEOS" SDKS="$SDKS" VERBOSE=1 || true
        fi

    - name: Find All Outputs
      if: always()
      run: |
        echo "=== All .deb files ==="
        find . -name "*.deb" -type f -exec ls -lh {} \; 2>/dev/null || echo "No .deb files found"
        
        echo ""
        echo "=== All .zip files ==="
        find . -name "*.zip" -type f -exec ls -lh {} \; 2>/dev/null || echo "No .zip files found"
        
        echo ""
        echo "=== Build Directory Contents ==="
        if [ -d ".theos" ]; then
          find .theos -type f \( -name "*.deb" -o -name "*.zip" \) -exec ls -lh {} \; 2>/dev/null
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Output
        path: |
          **/*.deb
          **/*.zip
          packages/
          .theos/
        retention-days: 30
        if-no-files-found: warn

    - name: Create Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/*.deb
          **/*.zip
        tag_name: build-${{ github.run_number }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      if: always()
      run: |
        echo "============================================"
        echo "Build Process Complete"
        echo "============================================"
        echo "Status: ${{ job.status }}"
        echo "Time: $(date)"
        echo "============================================"
